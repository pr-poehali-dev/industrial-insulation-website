<script>
(function() {
  var tracked = [];

  function setupVideo(video) {
    if (video.__loopHooked) return;
    video.__loopHooked = true;

    video.loop = true;
    video.muted = true;
    video.defaultMuted = true;
    video.autoplay = true;
    video.playsInline = true;
    video.setAttribute('loop', '');
    video.setAttribute('muted', '');
    video.setAttribute('autoplay', '');
    video.setAttribute('playsinline', '');
    video.removeAttribute('controls');

    tracked.push(video);

    var force = function() {
      try {
        video.currentTime = 0;
        var p = video.play();
        if (p && p.catch) p.catch(function(){});
      } catch (e) {}
    };

    video.addEventListener('ended', force);
    video.addEventListener('pause', function() {
      if (document.contains(video) && !document.hidden) {
        var p = video.play();
        if (p && p.catch) p.catch(function(){});
      }
    });

    var p = video.play();
    if (p && p.catch) p.catch(function(){});
  }

  // Глобальный тикер: каждые 250мс проверяем все видео
  setInterval(function() {
    tracked.forEach(function(video) {
      if (!document.contains(video)) return;
      // если близко к концу — перезапускаем
      if (video.duration && video.currentTime >= video.duration - 0.25) {
        try {
          video.currentTime = 0;
          var p = video.play();
          if (p && p.catch) p.catch(function(){});
        } catch (e) {}
      }
      // если на паузе — будим
      if (video.paused && !document.hidden) {
        var pp = video.play();
        if (pp && pp.catch) pp.catch(function(){});
      }
    });
  }, 250);

  function scan() {
    document.querySelectorAll('video').forEach(setupVideo);
  }

  scan();
  document.addEventListener('DOMContentLoaded', scan);
  window.addEventListener('load', scan);
  [200, 600, 1200, 2500, 5000].forEach(function(ms){ setTimeout(scan, ms); });

  var observer = new MutationObserver(function(mutations) {
    mutations.forEach(function(m) {
      m.addedNodes.forEach(function(node) {
        if (node.nodeType !== 1) return;
        if (node.tagName === 'VIDEO') setupVideo(node);
        else if (node.querySelectorAll) node.querySelectorAll('video').forEach(setupVideo);
      });
    });
  });
  observer.observe(document.documentElement, { childList: true, subtree: true });
})();
</script>
